<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/config.js"></script>
</head>
<body>

  <header id="site-header"></header>

  <div class="page-hero">
    <h1>Our Team</h1>
    <p>Meet the researchers building the future of the lab.</p>
  </div>

  <div style="background:#fff;">
    <div class="section" id="team-section">
      <!-- Dynamically grouped by role -->
    </div>
  </div>

  <footer id="site-footer"></footer>

  <script src="js/site.js"></script>
  <script>
    const c = LAB_CONFIG;
    document.title = `Team — ${c.labName}`;

    // Group members
    const groups = {};
    const order = ['Faculty', 'PhD Students', 'MS Students', 'Undergraduate', 'Alumni'];
    c.team.forEach(m => {
      if (!groups[m.group]) groups[m.group] = [];
      groups[m.group].push(m);
    });

    const section = document.getElementById('team-section');
    const groupOrder = [...order, ...Object.keys(groups).filter(g => !order.includes(g))];

    groupOrder.forEach(grp => {
      if (!groups[grp]) return;
      section.innerHTML += `<div class="group-label">${grp}</div><div class="team-grid" id="grp-${grp.replace(/\s/g,'_')}"></div>`;
    });

    c.team.forEach(m => {
      const grid = document.getElementById(`grp-${m.group.replace(/\s/g,'_')}`);
      if (!grid) return;

      const initials = m.name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
      const avatar = m.photo
        ? `<img src="${m.photo}" alt="${m.name}" />`
        : initials;

      const links = [
        m.website ? `<a href="${m.website}" target="_blank">Website</a>` : null,
        m.scholar  ? `<a href="${m.scholar}"  target="_blank">Scholar</a>`  : null,
        m.github   ? `<a href="https://github.com/${m.github}" target="_blank">GitHub</a>` : null,
      ].filter(Boolean).join('');

      grid.innerHTML += `
        <div class="member-card">
          <div class="member-avatar">${avatar}</div>
          <div class="member-name">${m.name}</div>
          <div class="member-role">${m.role}</div>
          <p class="member-bio">${m.bio}</p>
          ${links ? `<div class="member-links">${links}</div>` : ''}
        </div>`;
    });
  </script>
</body>
</html>
