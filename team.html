<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Publications</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/config.js"></script>
</head>
<body>

  <header id="site-header"></header>

  <div class="page-hero">
    <h1>Publications</h1>
    <p>Our published research, papers, and technical reports.</p>
  </div>

  <div style="background:#fff;">
    <div class="section">
      <div class="pub-filters" id="pub-filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <!-- Tag buttons injected by JS -->
      </div>
      <div id="pub-list"></div>
    </div>
  </div>

  <footer id="site-footer"></footer>

  <script src="js/site.js"></script>
  <script>
    const c = LAB_CONFIG;
    document.title = `Publications — ${c.labName}`;

    // Collect unique tags
    const allTags = [...new Set(c.publications.flatMap(p => p.tags || []))];
    const filterBar = document.getElementById('pub-filters');
    allTags.forEach(tag => {
      filterBar.innerHTML += `<button class="filter-btn" data-filter="${tag}">${tag}</button>`;
    });

    // Group by year
    function renderPubs(filter) {
      const pubs = filter === 'all'
        ? c.publications
        : c.publications.filter(p => (p.tags || []).includes(filter));

      const byYear = {};
      pubs.forEach(p => {
        if (!byYear[p.year]) byYear[p.year] = [];
        byYear[p.year].push(p);
      });

      const list = document.getElementById('pub-list');
      list.innerHTML = '';
      const years = Object.keys(byYear).sort((a,b) => b - a);
      years.forEach(yr => {
        let items = byYear[yr].map(p => {
          const links = [
            p.pdf  ? `<a href="${p.pdf}"  target="_blank">PDF</a>` : null,
            p.code ? `<a href="${p.code}" target="_blank">Code</a>` : null,
            p.doi  ? `<a href="${p.doi}"  target="_blank">DOI</a>` : null,
          ].filter(Boolean).join('');
          const tags = (p.tags || []).map(t => `<span class="pub-tag">${t}</span>`).join('');
          return `
            <div class="pub-item">
              <div class="pub-title">${p.title}</div>
              <div class="pub-authors">${p.authors}</div>
              <div class="pub-venue">${p.venue}</div>
              ${tags ? `<div class="pub-tags">${tags}</div>` : ''}
              ${links ? `<div class="pub-links">${links}</div>` : ''}
            </div>`;
        }).join('');
        list.innerHTML += `<div class="year-group"><div class="year-label">${yr}</div>${items}</div>`;
      });

      if (pubs.length === 0) {
        list.innerHTML = '<p style="color:#5A5A5A;">No publications found for this filter.</p>';
      }
    }

    renderPubs('all');

    // Filter buttons
    filterBar.addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderPubs(btn.dataset.filter);
    });
  </script>
</body>
</html>
